{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="keywords" content="">
	<meta name="author" content="">
	<meta name="robots" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- <meta name="description" content="Fillow : Fillow Saas Admin  Bootstrap 5 Template">
	<meta property="og:title" content="Fillow : Fillow Saas Admin  Bootstrap 5 Template">
	<meta property="og:description" content="Fillow : Fillow Saas Admin  Bootstrap 5 Template">
	<meta property="og:image" content="https:/fillow.dexignlab.com/xhtml/social-image.png">
	<meta name="format-detection" content="telephone=no"> -->
	
	<!-- PAGE TITLE HERE -->
	<title>Admin Dashboard</title>
	
	<!-- FAVICONS ICON -->
	<link rel="shortcut icon" type="image/png" href="{% static 'allstatic/images/favicon.png' %}">
	<link href="{% static 'allstatic/vendor/jquery-nice-select/css/nice-select.css' %}" rel="stylesheet">
	<link href="{% static 'allstatic/vendor/owl-carousel/owl.carousel.css' %}" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'allstatic/vendor/nouislider/nouislider.min.css' %}">
	
	<!-- Style css -->
    <link href="{% static 'allstatic/css/style.css' %}" rel="stylesheet">

	<!-- prims -->
    <link rel="stylesheet" href="{% static 'landingpage/css/prism.css' %}">

    {% block style %}
    {% endblock %}
</head>

<body>
    <!--*******************
        Preloader start
    ********************-->
    <div id="preloader">
		<div class="lds-ripple">
			<div></div>
			<div></div>
		</div>
    </div>
    <!--*******************
        Preloader end
    ********************-->

    <!--**********************************
        Main wrapper start
    ***********************************-->
    <div id="main-wrapper">
    
    {% block header %}
    {% endblock %}

    {% block sidebar %}
    {% endblock %}
    
    {% block content %}
    {% endblock %}
	<div id="loading-overlay" style="
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.7);
        z-index: 9999;
        display: none;
        cursor: wait;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: bold;
        color: #007bff;
    ">
        Processing, please wait...
    </div>

    {% block footer %}
    {% endblock %}

    </div>
    <!--**********************************
        Main wrapper end
    ***********************************-->
    
    <script src="{% static 'allstatic/vendor/global/global.min.js' %}"></script>
	<script src="{% static 'allstatic/vendor/chart.js/Chart.bundle.min.js' %}"></script>
	<script src="{% static 'allstatic/vendor/jquery-nice-select/js/jquery.nice-select.min.js' %}"></script>
	
	<!-- Apex Chart -->
	<script src="{% static 'allstatic/vendor/apexchart/apexchart.js' %}"></script>
	
	<!-- <script src="{% static 'allstatic/vendor/chart.js/Chart.bundle.min.js' %}"></script> -->
	
	<!-- Chart piety plugin files -->
    <script src="{% static 'allstatic/vendor/peity/jquery.peity.min.js' %}"></script>
	<!-- Dashboard 1 -->
	<script src="{% static 'allstatic/js/dashboard/dashboard-1.js' %}"></script>
	
	<script src="{% static 'allstatic/vendor/owl-carousel/owl.carousel.js' %}"></script>
	
    <script src="{% static 'allstatic/js/custom.min.js' %}"></script>
	<script src="{% static 'allstatic/js/dlabnav-init.js' %}"></script>
	<script src="{% static 'allstatic/js/demo.js' %}"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- <script src="{% static 'allstatic/js/styleSwitcher.js' %}"></script> -->
	<script>
		function cardsCenter()
		{
			
			/*  testimonial one function by = owl.carousel.js */
			
			jQuery('.card-slider').owlCarousel({
				loop:true,
				margin:0,
				nav:true,
				//center:true,
				slideSpeed: 3000,
				paginationSpeed: 3000,
				dots: true,
				navText: ['<i class="fas fa-arrow-left"></i>', '<i class="fas fa-arrow-right"></i>'],
				responsive:{
					0:{
						items:1
					},
					576:{
						items:1
					},	
					800:{
						items:1
					},			
					991:{
						items:1
					},
					1200:{
						items:1
					},
					1600:{
						items:1
					}
				}
			})
		}
		
		jQuery(window).on('load',function(){
			setTimeout(function(){
				cardsCenter();
			}, 1000); 
		});
		
	</script>

	<!-- prims -->
    <script src="{% static 'landingpage/js/prism.js' %}"></script>
    
    {% block script%}
    {% endblock %}
</body>
</html>
