{% extends "dashboardbase.html" %}
{% load static %}

{% block style %}
<style>
.otp-input {
        width: 60px;           /* lebar kotak */
        height: 60px;          /* tinggi kotak */
        font-size: 20px;       /* ukuran angka */
        text-align: center;    /* teks di tengah */
        border: 2px solid #167ae6; /* warna border */
        border-radius: 8px;    /* sudut melengkung */
        font-weight: bold;     /* angka tebal */
        line-height: 60px; /* buat teks pas vertikal */
        padding: 0;        /* hilangkan padding bawaan */
        box-sizing: border-box; /* pastikan border masuk hitungan height */
    }
.otp-input:focus {
        border-color: #0d6efd; /* warna border saat fokus */
    }
</style>
{% endblock %}

{% block content %}
<!--**********************************
    Content body start
***********************************-->
<div class="authincation h-100">
    <div class="container h-100">
        <div class="row justify-content-center h-100 align-items-center">
            <div class="col-md-6">
                <div class="authincation-content mt-5">
                    <div class="row no-gutters">
                        <div class="col-xl-12">
                            <div class="auth-form">
                                <div class="text-center mb-3">
                                    <h1 style="color: #167ae6; font-weight: 1000;">HELLO USER</h1>
                                </div>
                                <h4 class="text-center mb-4">Forgot Password</h4>
                                <form method="post" id="login">
                                    {% csrf_token %}
                                    <div class="mb-3">
                                        <label class="mb-1"><strong>Email</strong></label>
                                        <input type="email" class="form-control" placeholder="hello@example.com" id="email" name="gmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="mb-1"><strong>New Password</strong></label>
                                        <input type="password" class="form-control" placeholder="New Password" id="password" name="password" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="mb-1"><strong>Confirm Your New Password</strong></label>
                                        <input type="password" class="form-control" placeholder="Confirm Your New Password" id="retypepassword" required>
                                    </div>
                                    <div class="text-center">
                                        <button type="submit" class="btn btn-primary btn-block" id="sendotp">Send Me OTP</button>
                                    </div>
                                    <div id="otpinput" style="display:none;" class="mb-3 mt-3">
                                        <label class="mb-1"><strong>Input Your OTP Here</strong></label>
                                        <div class="d-flex justify-content-center mb-3" style="text-align: center;">
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                            <input type="text" maxlength="1" class="form-control otp-input mx-1" style="width:50px; text-align:center;" />
                                        </div>
                                        <button type="submit" class="btn btn-success btn-block setujuupdate" data-type="gantipass" id="gantipassword">Ganti Password</button>
                                    </div>
                                </form>
                                <div class="new-account mt-3">
                                    <p>have an account? <a class="text-primary" style="color: blue;" href="{% url 'login' %}">Login here</a></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--**********************************
    Content body end
***********************************-->
{% endblock %}


{% block script %}
<script>
    document.addEventListener("DOMContentLoaded", function(){
        let inputs = document.querySelectorAll(".otp-input");

        inputs.forEach((input, index) => {
            input.addEventListener("input", function() {
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener("keydown", function(e) {
                if (e.key === "Backspace" && this.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    });

    $("#sendotp").click(function(event) {
        event.preventDefault();

        function validate() {
            const email = $("#email").val();
            if (!email.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Inputkan email terlebih dahulu!",
                });
                return false;
            } 
            if (!email.includes("@")) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Email harus mengandung @gmail atau @company!",
                });
                return false;
            } 

            const password = $("#password").val();
            if (!password.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Inputkan password terlebih dahulu!",
                });
                return false;
            }
            if (password.length <= 7) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password minimal 8 karakter!",
                });
                return false;
            }
            if (password.length >= 25) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password maximal 25 karakter!",
                });
                return false;
            }

            const retypepassword = $("#retypepassword").val();
            if (!retypepassword.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Harap ulangi password!",
                });
                return false;
            }

            if (retypepassword.trim() !== password.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password dan ulangi password harus sama!",
                });
                return false;
            }
            return true;
        }

        if (!validate()) {
            return true;
        }

        $("#loading-overlay").css("display", "flex");

        let formdata = new FormData();
        formdata.append("email", $("#email").val());
        formdata.append("csrfmiddlewaretoken", $("input[name=csrfmiddlewaretoken]").val());
        $.ajax({
            url: "{% url 'forgotpassword' %}",
            type: "POST",
            data: formdata,
            processData: false, // agar jQuery tidak memproses data jadi string
            contentType: false, //agar jQuery tidak set content-type ke application/x-www-form-urlencoded
            success: function (response) {
                if (response.status == "success") {
                    $("#loading-overlay").hide();
                    Swal.fire({
                        icon: "success",
                        title: "Berhasil!",
                        text: response.message,
                        confirmButtonText: "OK",
                    }).then((result) => {
                        if (result.isConfirmed) {
                            $("#otpinput").slideDown();
                        }
                    });
                } else {
                    $("#loading-overlay").hide();
                    let errorMessage = response.message;
                    Swal.fire({
                        icon: "error",
                        title: "Oops...",
                        text: "Gagal mengirim otp, harap pastikan email sudah benar!"+ errorMessage,
                    });
                }
            },
        })
    });

    function getOtpValue() {
        let otp = "";
        document.querySelectorAll(".otp-input").forEach(input => {
            otp += input.value;
        });
        return otp;
    }

    $("#gantipassword").click(function(event) {
        event.preventDefault();

        let otpCode = getOtpValue();

        function validate() {
            const email = $("#email").val();
            if (!email.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Inputkan email terlebih dahulu!",
                });
                return false;
            } 
            if (!email.includes("@")) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Email harus mengandung @gmail atau @company!",
                });
                return false;
            } 

            const password = $("#password").val();
            if (!password.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Inputkan password terlebih dahulu!",
                });
                return false;
            }
            if (password.length <= 7) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password minimal 8 karakter!",
                });
                return false;
            }
            if (password.length >= 25) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password maximal 25 karakter!",
                });
                return false;
            }

            const retypepassword = $("#retypepassword").val();
            if (!retypepassword.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Harap ulangi password!",
                });
                return false;
            }

            if (retypepassword.trim() !== password.trim()) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Password dan ulangi password harus sama!",
                });
                return false;
            }


            if (otpCode.length !== 6) {
                Swal.fire({
                    icon: "error",
                    title: "Oops...",
                    text: "Harap isi semua 6 digit OTP!",
                });
                return false;
            }
            return true;
        }

        if (!validate()) {
            return true;
        }

        $("#loading-overlay").css("display", "flex");

        let formdata = new FormData();
        formdata.append("email", $("#email").val());
        formdata.append("password", $("#password").val());
        formdata.append("otp", otpCode);
        formdata.append("csrfmiddlewaretoken", $("input[name=csrfmiddlewaretoken]").val());
        $.ajax({
            url: "{% url 'replacepassword' %}",
            type: "POST",
            data: formdata,
            processData: false, // agar jQuery tidak memproses data jadi string
            contentType: false, //agar jQuery tidak set content-type ke application/x-www-form-urlencoded
            success: function (response) {
                if (response.status == "success") {
                    $("#loading-overlay").hide();
                    Swal.fire({
                        icon: "success",
                        title: "Berhasil!",
                        text: response.message,
                        confirmButtonText: "OK",
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = "{% url 'login' %}";
                        }
                    });
                } else {
                    $("#loading-overlay").hide();
                    let errorMessage = response.message;
                    Swal.fire({
                        icon: "error",
                        title: "Oops...",
                        text: "Gagal merubah password, harap pastikan email sudah benar!"+ errorMessage,
                    });
                }
            },
        })
    });
</script>
{% endblock %}
